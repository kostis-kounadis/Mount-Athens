name: Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Fetch & Parse Latest Excursions
        continue-on-error: true
        run: |
          node scripts/fetch-raw.js
          node scripts/extract-text.js
          node scripts/parse-events.js
          node scripts/debug-fetch.js

      - name: Commit Updated Events
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f src/data/events.json src/data/status.json src/data/debug-output.txt
          git diff-index --quiet HEAD || (git commit -m "Auto-update parsed events [cron]" && git push origin main)

      - name: Build Astro Site
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
