name: Test Club Connections

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-connections:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Fetch Raw Pages (Test Connections)
        run: node scripts/fetch-raw.js

      - name: Run Parser
        run: node scripts/parse-events.js
