[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# API endpoint for events
[[redirects]]
  from = "/api/events"
  to = "/.netlify/functions/events"
  status = 200

# API endpoint for triggering parse manually
[[redirects]]
  from = "/api/parse"
  to = "/.netlify/functions/parse-events"
  status = 200
